<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | Träningsportalen</title>
    <meta name="description" content="Logga in på din personliga träningsportal hos Framtidspuls.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy:   { DEFAULT: '#0b1628', light: '#11213d' },
                        puls:   { lighter: '#90e0ef', light: '#48cae4', DEFAULT: '#00b4d8' },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F3F7FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #18181b;
            padding: 24px;
        }
        .glass-card {
            background: #ffffff;
            border: 1.5px solid rgba(0, 0, 0, 0.05);
            border-radius: 32px;
            padding: 48px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
        }
        .form-input {
            background: #F3F7FA;
            border: 1.5px solid rgba(0, 0, 0, 0.05);
            color: #0b1628;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            text-align: center;
            font-size: 1.125rem;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #00b4d8;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,180,216,0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #00b4d8, #48cae4);
            color: #fff;
            font-weight: 800;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            margin-top: 24px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 25px rgba(0,180,216,0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,180,216,0.4);
            opacity: 0.95;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <!-- Logo -->
        <img src="framtidspuls_logo.png" alt="Framtidspuls" class="mx-auto mb-10 h-16 w-auto">

        <h1 class="text-3xl font-black mb-2 text-navy">Träningsportalen</h1>
        <p class="text-zinc-400 mb-10 text-lg leading-relaxed font-medium">Logga in för att komma åt program och övningar.</p>

        <form onsubmit="checkPassword(event)" class="space-y-4">
            <input type="password" id="password" placeholder="Ange lösenord" class="form-input" required>
            <div id="error-msg" class="hidden text-red-400 text-sm font-semibold">❌ Felaktigt lösenord, försök igen.</div>
            <button type="submit" class="btn-login">Logga in</button>
        </form>

        <a href="index.html" class="inline-block mt-8 text-sm text-zinc-300 hover:text-puls transition-all font-bold uppercase tracking-widest">
            ← Tillbaka
        </a>
    </div>

    <script>
        function checkPassword(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');
            
            if (pass === 'framtidspuls2024') {
                sessionStorage.setItem('portal_auth', 'active');
                window.location.href = 'portal.html';
            } else {
                error.classList.remove('hidden');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>
</body>
</html>
