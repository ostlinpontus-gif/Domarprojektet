<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | Träningsportalen</title>
    <meta name="description" content="Logga in på din personliga träningsportal hos Framtidspuls.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy:   { DEFAULT: '#0b1628', light: '#11213d' },
                        puls:   { lighter: '#90e0ef', light: '#48cae4', DEFAULT: '#00b4d8' },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b1628;
            background-image:
                radial-gradient(ellipse at 15% 20%,  rgba(0,180,216,0.15)  0%, transparent 50%),
                radial-gradient(ellipse at 85% 75%,  rgba(144,224,239,0.10) 0%, transparent 48%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            padding: 24px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            text-align: center;
            font-size: 1.125rem;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #00b4d8;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 4px rgba(0,180,216,0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #00b4d8, #48cae4);
            color: #fff;
            font-weight: 700;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            margin-top: 24px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 25px rgba(0,180,216,0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,180,216,0.4);
            opacity: 0.95;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <!-- Logo placeholder/Icon -->
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-2xl" style="background: linear-gradient(135deg, #00b4d8, #48cae4);">
            <svg viewBox="0 0 24 24" class="w-8 h-8 fill-white" xmlns="http://www.w3.org/2000/svg">
                <circle cx="13" cy="4" r="2"/>
                <path d="M6 13l1.5 5H11l1-4 3 2v4h2v-5l-3.5-2.5L15 10l-3-1.5-2.5 3L6 13z"/>
            </svg>
        </div>

        <h1 class="text-3xl font-black mb-2">Välkommen</h1>
        <p class="text-white text-opacity-50 mb-10 text-lg leading-relaxed">Välkommen till din träningsportal</p>

        <form onsubmit="checkPassword(event)" class="space-y-4">
            <input type="password" id="password" placeholder="Ange lösenord" class="form-input" required>
            <div id="error-msg" class="hidden text-red-400 text-sm font-semibold">❌ Felaktigt lösenord, försök igen.</div>
            <button type="submit" class="btn-login">Logga in</button>
        </form>

        <a href="index.html" class="inline-block mt-8 text-sm text-white text-opacity-30 hover:text-white transition-opacity">
            ← Tillbaka till hemsidan
        </a>
    </div>

    <script>
        function checkPassword(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');
            
            if (pass === 'framtidspuls2024') {
                sessionStorage.setItem('portal_auth', 'active');
                window.location.href = 'portal.html';
            } else {
                error.classList.remove('hidden');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>
</body>
</html>
