<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tack | Framtidspuls</title>
    <meta name="description" content="Vi har tagit emot din intresseanmälan. Tack för att du bidrar till Framtidspuls.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy:   { DEFAULT: '#0b1628', light: '#11213d' },
                        puls:   { lighter: '#90e0ef', light: '#48cae4', DEFAULT: '#00b4d8' },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F3F7FA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #0b1628;
            padding: 24px;
        }
        .glass-card {
            background: #ffffff;
            border: 1.5px solid rgba(0, 0, 0, 0.05);
            border-radius: 32px;
            text-align: center;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            animation: cardUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        @keyframes cardUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .btn-primary {
            background: linear-gradient(135deg, #00b4d8, #48cae4);
            transition: all 0.2s ease;
            box-shadow: 0 10px 28px rgba(0,180,216,0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-primary:hover {
            opacity: 0.94;
            transform: translateY(-2px);
            box-shadow: 0 14px 34px rgba(0,180,216,0.3);
        }
    </style>
</head>
<body>

    <main class="glass-card">
        <!-- Icon -->
        <div class="w-20 h-20 bg-puls bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-8 text-4xl">
            ✅
        </div>

        <!-- Headline -->
        <h1 class="text-3xl font-black mb-4 leading-tight text-navy">Tack för ditt<br>intresse!</h1>

        <!-- Text -->
        <p class="text-zinc-500 text-lg leading-relaxed mb-10 font-medium">
            Vi har tagit emot din förfrågan och återkommer personligen till dig inom kort. Tillsammans bygger vi ett friskare Hälsingland.
        </p>

        <!-- Button -->
        <a href="index.html" class="btn-primary text-white font-bold px-10 py-4 rounded-xl text-lg inline-block w-full">
            Tillbaka till startsidan
        </a>

        <!-- Small text link -->
        <div class="mt-8 pt-8 border-t border-zinc-100">
            <a href="index.html" class="text-xs font-black uppercase tracking-widest text-zinc-300 hover:text-puls transition-all">
                Se fler förmåner
            </a>
        </div>
    </main>

    <!-- Footer credit -->
    <p class="text-zinc-300 text-[10px] font-black uppercase tracking-[0.3em] mt-12 text-center max-w-lg">
        © Framtidspuls – För ett friskare och tryggare Hälsingland.
    </p>

</body>
</html>
